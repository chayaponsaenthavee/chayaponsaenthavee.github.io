<html>
<head>
    <title>Transformations</title>
</head>
<body><div style="margin-bottom: 30px; font-family: sans-serif;">
        <p><strong>ชื่อ-นามสกุล:</strong> นาย ชยพล แสนทวี</p>
        <p><strong>รหัสนักศึกษา:</strong> 6721601095</p>
        <p><strong>หมู่:</strong>700</p>
        <p><strong>การศึกษา:</strong> นิสิตชั้นปีที่ 3 สาขาวิทยาการคอมพิวเตอร์ </p>
        <p><strong>คณะ::</strong>ศิลปศาสตร์และวิทยาศาสตร์ มหาวิทยาลัยเกษตรศาสตร์ วิทยาเขตกำแพงแสน</p>
    </div>
    <hr>
    <h1>Interactive Computer Graphics</h1>
    <canvas id="canvas" width="200" height="200"
        style="width:500px; height:500px; border:1px solid #edebeb; image-rendering: pixelated;">
    </canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageData = ctx.createImageData(canvas.width, canvas.height);
        const data = imageData.data;

        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let degree = 0;
        let scale = 1;
        let mouseX = 100;
        let mouseY = 100;

        function putPixel(x, y, r, g, b, a = 255) {
            if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                const idx = (y * canvas.width + x) * 4;
                data[idx] = r;
                data[idx + 1] = g;
                data[idx + 2] = b;
                data[idx + 3] = a;
            }
        }


        function DrawRectFilled(x1, y1, x2, y2, r, g, b, a = 255) {
            for (let y = y1; y <= y2; y++) {
                for (let x = x1; x <= x2; x++) {
                    putPixel(x, y, r, g, b, a);
                }
            }
        }

        function drawEllipse(cx, cy, rx, ry, r, g, b, a = 255) {
            for (let y = -ry; y <= ry; y++) {
                for (let x = -rx; x <= rx; x++) {
                    if ((rx === 0 || ry === 0) || (x * x) / (rx * rx) + (y * y) / (ry * ry) <= 1) {
                        putPixel(cx + x, cy + y, r, g, b, a);
                    }
                }
            }
        }

        function toScaledMouseCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: Math.floor((clientX - rect.left) * scaleX),
                y: Math.floor((clientY - rect.top) * scaleY)
            };
        }

        const smileSprite24Bit = [
            [null, null, 0xB45309, 0xD97706, 0xD97706, 0xB45309, null, null],
            [null, 0xD97706, 0xFDE047, 0xFEF08A, 0xFEF08A, 0xFDE047, 0xD97706, null],
            [0xB45309, 0xFDE047, 0x111827, 0xFDE047, 0xFDE047, 0x111827, 0xFDE047, 0xB45309],
            [0xD97706, 0xFEF08A, 0x111827, 0xFEF08A, 0xFEF08A, 0x111827, 0xFEF08A, 0xD97706],
            [0xD97706, 0xFDE047, 0xFDE047, 0xFDE047, 0xFDE047, 0xFDE047, 0xFDE047, 0xD97706],
            [0xB45309, 0xFDE047, 0x111827, 0xFDE047, 0xFDE047, 0x111827, 0xFDE047, 0xB45309],
            [null, 0xD97706, 0xFDE047, 0x111827, 0x111827, 0xFDE047, 0xD97706, null],
            [null, null, 0xB45309, 0xD97706, 0xD97706, 0xB45309, null, null],
        ];

        function drawSprite24BitRotateScale(sprite, x, y, degree, scaleX, scaleY) {
            const rad = degree * (Math.PI / 180);
            for (let j = 0; j < sprite.length; j++) {
                for (let i = 0; i < sprite[j].length; i++) {
                    const color = sprite[j][i];
                    if (color !== null) {
                        const r = (color >> 16) & 255;
                        const g = (color >> 8) & 255;
                        const b = color & 255;

                        // หาจุดกึ่งกลางของ Sprite เพื่อให้หมุนรอบจุดศูนย์กลาง
                        const cx = i - (sprite[j].length / 2);
                        const cy = j - (sprite.length / 2);

                        // Rotate
                        const x_rot = cx * Math.cos(rad) - cy * Math.sin(rad);
                        const y_rot = cx * Math.sin(rad) + cy * Math.cos(rad);

                        // Scale
                        const x_scaled = x_rot * scaleX;
                        const y_scaled = y_rot * scaleY;

                        // วาดพิกเซลด้วย drawEllipse เพื่อไม่ให้เกิดช่องว่างเวลาขยายใหญ่ขึ้น
                        drawEllipse(Math.round(x_scaled + x), Math.round(y_scaled + y), Math.max(1, Math.round(scaleX / 2)), Math.max(1, Math.round(scaleY / 2)), r, g, b
                        );
                    }
                }
            }
        }
        canvas.addEventListener('mousedown', function (even) {
            isDragging = true;
            const { x, y } = toScaledMouseCoords(even.clientX, even.clientY);
            putPixel(x, y, 0, 255, 0, 255);
            ctx.putImageData(imageData, 0, 0);
        });

        canvas.addEventListener('mouseup', function (even) {
            isDragging = false;
            const { x, y } = toScaledMouseCoords(even.clientX, even.clientY);
            putPixel(x, y, 0, 0, 255, 255);
            ctx.putImageData(imageData, 0, 0);
        });

        canvas.addEventListener('mousemove', function (even) {
            const { x, y } = toScaledMouseCoords(even.clientX, even.clientY);
            mouseX = x;
            mouseY = y;
            if (isDragging) {
                drawLine(previousMouseX, previousMouseY, x, y, 0, 0, 0, 255);
            }
            ctx.putImageData(imageData, 0, 0);
            previousMouseX = x;
            previousMouseY = y;
        });

        window.addEventListener('keydown', function (even) {
            if (even.key === 'ArrowLeft') {
                degree -= 5;
            } else if (even.key === 'ArrowRight') {
                degree += 5;
            }

            if (even.key === 'ArrowUp') {
                scale += 0.1;
            } else if (even.key === 'ArrowDown') {
                scale = Math.max(0.1, scale - 0.1);
            }
        });

        function animate() {
            // ล้างจอเป็นสีขาว
            DrawRectFilled(0, 0, canvas.width, canvas.height, 255, 255, 255);
            // วาดและควบคุม Sprite 24-bit (หมุนตามปุ่มลูกศร ซ้าย/ขวา, ขยายตาม บน/ล่าง, ย้ายตามตำแหน่งเมาส์)
            drawSprite24BitRotateScale(smileSprite24Bit, mouseX, mouseY, degree, scale*5 , scale*5 );
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
